name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
          - name: macos-x64
            os: macos-13
          - name: macos-arm64
            os: macos-14
          - name: windows-x64
            os: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libfontconfig1-dev \
            libgl1-mesa-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb1-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxrandr-dev \
            pkg-config

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ runner.os }}-${{ matrix.name }}

      - name: Build release binaries
        if: runner.os != 'macOS'
        run: cargo build --workspace --release --locked

      - name: Build release binaries
        if: runner.os == 'macOS'
        env:
          RDL_SKIP_MACOS_ADHOC_SIGN: "1"
        run: cargo build --workspace --release --locked

      - name: Ad-hoc sign macOS binaries
        if: runner.os == 'macOS'
        run: |
          codesign --force --sign - --identifier local.rust-desk-light.server target/release/rdl-server
          codesign --force --sign - --identifier local.rust-desk-light.client target/release/rdl-client
          codesign --force --sign - --identifier local.rust-desk-light.admin target/release/rdl-admin
          codesign --verify --verbose target/release/rdl-server
          codesign --verify --verbose target/release/rdl-client
          codesign --verify --verbose target/release/rdl-admin

      - name: Package Unix artifacts
        if: runner.os != 'Windows'
        run: |
          package_component() {
            component="$1"
            binary="$2"
            package="rust-desk-light-$component-${{ matrix.name }}"
            mkdir -p "dist/$package"
            cp "target/release/$binary" "dist/$package/"
            cp README.md "dist/$package/"
            chmod +x "dist/$package/$binary"
            tar -czf "dist/$package.tar.gz" -C dist "$package"
          }

          package_component server rdl-server
          package_component client rdl-client
          package_component admin rdl-admin

      - name: Package Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $components = @(
            @{ Name = "server"; Binary = "rdl-server.exe" },
            @{ Name = "client"; Binary = "rdl-client.exe" },
            @{ Name = "admin"; Binary = "rdl-admin.exe" }
          )

          foreach ($component in $components) {
            $package = "rust-desk-light-$($component['Name'])-${{ matrix.name }}"
            New-Item -ItemType Directory -Force -Path "dist\$package" | Out-Null
            Copy-Item "target\release\$($component['Binary'])" "dist\$package\"
            Copy-Item "README.md" "dist\$package\"
            Compress-Archive -Path "dist\$package\*" -DestinationPath "dist\$package.zip"
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-desk-light-${{ matrix.name }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: rust-desk-light ${{ github.ref_name }}
          body: |
            ## rust-desk-light ${{ github.ref_name }}

            Auto-generated release from tag `${{ github.ref_name }}`.

            ### Packages

            | Component | Platform | Package |
            | --- | --- | --- |
            | Server | Linux x64 | rust-desk-light-server-linux-x64.tar.gz |
            | Client | Linux x64 | rust-desk-light-client-linux-x64.tar.gz |
            | Admin | Linux x64 | rust-desk-light-admin-linux-x64.tar.gz |
            | Server | macOS x64 | rust-desk-light-server-macos-x64.tar.gz |
            | Client | macOS x64 | rust-desk-light-client-macos-x64.tar.gz |
            | Admin | macOS x64 | rust-desk-light-admin-macos-x64.tar.gz |
            | Server | macOS ARM64 | rust-desk-light-server-macos-arm64.tar.gz |
            | Client | macOS ARM64 | rust-desk-light-client-macos-arm64.tar.gz |
            | Admin | macOS ARM64 | rust-desk-light-admin-macos-arm64.tar.gz |
            | Server | Windows x64 | rust-desk-light-server-windows-x64.zip |
            | Client | Windows x64 | rust-desk-light-client-windows-x64.zip |
            | Admin | Windows x64 | rust-desk-light-admin-windows-x64.zip |

            Each package contains the selected binary and `README.md`.
            Rust release builds are native binaries, so there is no separate runtime/no-runtime split like .NET.
          draft: false
          prerelease: false
          files: dist/*
